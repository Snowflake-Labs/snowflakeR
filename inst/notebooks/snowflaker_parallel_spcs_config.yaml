# =============================================================================
# snowflakeR -- Embarrassingly parallel SPCS demo (Workspace)
# =============================================================================
# R + forecast + foreach/iterators for doSnowflake (tasks + queue modes).
# Companion notebooks: workspace_parallel_spcs_setup.ipynb,
# workspace_parallel_spcs_demo.ipynb, workspace_parallel_spcs_monitor.ipynb
#
# Usage:
#   from sfnb_setup import setup_notebook
#   setup_notebook(
#       config="snowflaker_parallel_spcs_config.yaml",
#       packages=["snowflakeR", "RSnowflake"]
#   )
#
# Runtime identifiers for the parallel lab (all three notebooks + Streamlit)
# live under `parallel_lab` below.
#
# Generic defaults for clean-room demo runs. Override in private/internal clones
# if you need account-specific objects for benchmarking.
# =============================================================================

context:
  warehouse: SFLAB_EP_WH
  database: SFLAB_EP_DEMO
  schema: SOURCE_DATA

# Single source for workspace_parallel_spcs_* notebooks + streamlit_parallel_demo_monitor.py
parallel_lab:
  database: SFLAB_EP_DEMO
  schemas:
    source_data: SOURCE_DATA
    config: CONFIG
    models: MODELS
  warehouse: SFLAB_EP_WH
  # Workspace accounts: use the account CPU pool (avoids dedicated-pool node
  # limits). Grant the notebook role USAGE/MONITOR/OPERATE on this pool.
  # Override to a dedicated pool (e.g. SFLAB_EP_POOL) if your account does not
  # expose SYSTEM_COMPUTE_POOL_CPU.
  compute_pool: SYSTEM_COMPUTE_POOL_CPU
  # Set this to your own image repository path before running tasks/queue jobs.
  image_uri: "/sflab_ep_demo/config/sfr_images/dosnowflake-worker:latest"
  dosnowflake_stage_name: DOSNOWFLAKE_STAGE
  queue_table: DOSNOWFLAKE_QUEUE
  # Create deterministic synthetic data by default (no external table dependency).
  create_synthetic_series_table: true
  # Demo driver defaults.
  demo_forecast_n_skus: 2000
  demo_tasks_chunks_per_job: 10
  demo_queue_n_workers: 10
  demo_queue_chunks_per_job: 10

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-forecast>=8.0
      - r-foreach
      - r-iterators
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.2.0/snowflakeR_0.2.0.tar.gz"
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
