# =============================================================================
# snowflakeR -- Base Config
# =============================================================================
# R environment for snowflakeR notebooks (quickstart, model registry,
# doSnowflake). Installs snowflakeR from GitHub Releases for fast setup.
#
# Usage (single cell):
#   from sfnb_setup import setup_notebook
#   setup_notebook(config="snowflaker_config.yaml", packages=["snowflakeR"])
#
# All sections below are OPTIONAL -- sensible defaults are used when omitted.
# =============================================================================

# -- Session context (optional) -----------------------------------------------
# context:
#   warehouse: "MY_WH"
#   database: "MY_DB"
#   schema: "MY_SCHEMA"

# -- EAI settings (optional) --------------------------------------------------
# eai:
#   managed: "MY_EAI"
#   supplementary_name: "MULTILANG_NOTEBOOK_EAI"

# -- Custom mirrors (Artifactory / Nexus / air-gapped environments) -----------
# Uncomment and set these to route all package downloads through your
# internal artifact repository proxy. Works with JFrog Artifactory,
# Sonatype Nexus, AWS CodeArtifact, or any standard proxy.
# When mirrors are set, the EAI only needs to allow your mirror host(s)
# instead of the ~15 public upstream domains.
#
# mirrors:
#   conda_channel: "https://artifactory.example.com/conda-forge-remote"
#   pypi_index: "https://artifactory.example.com/api/pypi/pypi-remote/simple"
#   cran_mirror: "https://artifactory.example.com/cran-remote"
#   micromamba_url: "https://artifactory.example.com/generic-tools/micromamba/linux-64/latest"
#   ssl_cert_path: "/etc/ssl/certs/corporate-ca-bundle.crt"
#   auth_secret: "mydb.myschema.artifactory_creds"  # Snowflake PASSWORD secret

# -- Model Registry conda channel policy (optional) ---------------------------
# Force all sfr_log_model() conda_dependencies to resolve from a specific
# channel (e.g. conda-forge) instead of the default Snowflake Anaconda Channel.
# Set conda_channel_strict: true to prevent users from overriding the channel.
#
# registry:
#   conda_channel: "conda-forge"
#   conda_channel_strict: true

# -- Language and package spec ------------------------------------------------
env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.2.0/snowflakeR_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
