# =============================================================================
# snowflakeR -- Marketing Analytics Demo Config
# =============================================================================
# R environment for Marketing Mix Modeling (Robyn) and Causal Inference
# (CausalImpact) demonstrations. Includes both conda-forge packages
# (pre-compiled binaries) and CRAN packages (Robyn, lares).
#
# Usage (single cell):
#   from sfnb_setup import setup_notebook
#   setup_notebook(config="snowflaker_marketing_config.yaml")
#
# All sections below are OPTIONAL -- sensible defaults are used when omitted.
# =============================================================================

# -- Session context (optional) -----------------------------------------------
# context:
#   warehouse: "MY_WH"
#   database: "MY_DB"
#   schema: "MY_SCHEMA"

# -- EAI settings (optional) --------------------------------------------------
# eai:
#   managed: "MY_EAI"
#   supplementary_name: "MULTILANG_NOTEBOOK_EAI"

# -- Language and package spec ------------------------------------------------
env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      # Base snowflakeR dependencies
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-nanoarrow
      - r-dplyr>=1.1.0
      # CausalImpact and dependencies (all on conda-forge)
      - r-causalimpact
      - r-bsts
      - r-boom
      - r-zoo
      # Robyn dependencies (conda-forge where available)
      - r-nloptr
      - r-prophet
      - r-cmdstanr
      - cmdstan
      - r-glmnet
      - r-doparallel
      - r-dorng
      - r-foreach
      - r-ggridges
      - r-patchwork
    cran_packages:
      - lares
      - Robyn
    pip_packages:
      - nevergrad
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.1.0/snowflakeR_0.1.0.tar.gz"
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false
  julia:
    enabled: false
