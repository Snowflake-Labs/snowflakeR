# =============================================================================
# snowflakeR -- Feature Store Config
# =============================================================================
# R environment for the Feature Store notebook. Includes both snowflakeR
# (ML platform) and RSnowflake (DBI connector for dbplyr queries).
#
# Usage:
#   from sfnb_setup import install_r, install_r_packages
#   install_r(config="snowflaker_feature_store_config.yaml")
#   install_r_packages(config="snowflaker_feature_store_config.yaml")
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-dplyr>=1.1.0
      - r-nanoarrow
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.1.0/snowflakeR_0.1.0.tar.gz"
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
