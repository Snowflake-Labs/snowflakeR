# =============================================================================
# snowflakeR -- Credit Risk Demo Config
# =============================================================================
# R environment for credit risk scoring notebooks. Includes the full
# tidymodels stack plus XGBoost and ranger -- all pre-compiled from conda-forge.
#
# Usage (single cell):
#   from sfnb_setup import setup_notebook
#   setup_notebook(config="snowflaker_credit_risk_config.yaml")
#
# All sections below are OPTIONAL -- sensible defaults are used when omitted.
# =============================================================================

# -- Session context (optional) -----------------------------------------------
# context:
#   warehouse: "MY_WH"
#   database: "MY_DB"
#   schema: "MY_SCHEMA"

# -- EAI settings (optional) --------------------------------------------------
# eai:
#   managed: "MY_EAI"
#   supplementary_name: "MULTILANG_NOTEBOOK_EAI"

# -- Language and package spec ------------------------------------------------
env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-nanoarrow
      - r-dplyr>=1.1.0
      - r-tidymodels
      - r-xgboost
      - r-ranger
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.1.0/snowflakeR_0.1.0.tar.gz"
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false

# -- Credit risk specific settings (read by sfr_load_notebook_config) -----
# credit_risk:
#   database: "CREDIT_RISK_ML"
#   source_schema: "RAW_DATA"
#   feature_store_schema: "FEATURES"
#   training_schema: "TRAINING"
#   registry_schema: "MODELS"
