# =============================================================================
# snowflakeR -- Credit Risk Demo Config
# =============================================================================
# R environment for credit risk scoring notebooks. Includes the full
# tidymodels stack (recipes, parsnip, workflows, yardstick, rsample, tune)
# plus XGBoost and ranger engines -- all pre-compiled from conda-forge.
#
# Usage:
#   from sfnb_setup import install_r, install_r_packages
#   install_r(config="snowflaker_credit_risk_config.yaml")
#   install_r_packages(config="snowflaker_credit_risk_config.yaml")
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-tidyverse
      - r-dbplyr
      - r-httr2>=1.0.0
      - r-lazyeval
      - r-dbi>=1.2.0
      - r-jsonlite
      - r-nanoarrow
      - r-dplyr>=1.1.0
      - r-tidymodels
      - r-xgboost
      - r-ranger
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      snowflakeR: "https://github.com/Snowflake-Labs/snowflakeR/releases/download/v0.1.0/snowflakeR_0.1.0.tar.gz"
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
