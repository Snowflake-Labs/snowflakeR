<script>
/**
 * Sidebar toggle controls for Quarto book layout.
 * Buttons are appended to <body> (fixed position) so they remain
 * accessible even when a sidebar is collapsed to zero width.
 * State is persisted in localStorage across page navigations.
 */
(function () {
  "use strict";

  var STORAGE_LEFT  = "sf-sidebar-left-collapsed";
  var STORAGE_RIGHT = "sf-sidebar-right-collapsed";

  var CHEVRON_LEFT =
    '<svg width="16" height="16" viewBox="0 0 16 16">' +
    '<path d="M10.5 3.5L6 8l4.5 4.5" stroke="currentColor" stroke-width="2.5" ' +
    'fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var CHEVRON_RIGHT =
    '<svg width="16" height="16" viewBox="0 0 16 16">' +
    '<path d="M5.5 3.5L10 8l-4.5 4.5" stroke="currentColor" stroke-width="2.5" ' +
    'fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function positionLeftBtn(btn, sidebar, collapsed) {
    if (collapsed) {
      btn.style.left = "0px";
    } else {
      btn.style.left = sidebar.offsetWidth + "px";
    }
  }

  function init() {
    var sidebar       = document.getElementById("quarto-sidebar");
    var marginSidebar = document.getElementById("quarto-margin-sidebar");
    var body          = document.body;

    if (!sidebar && !marginSidebar) return;

    var leftOff  = localStorage.getItem(STORAGE_LEFT) === "true";
    var rightOff = localStorage.getItem(STORAGE_RIGHT) === "true";

    // --- Left sidebar toggle ---
    if (sidebar) {
      var btnL = document.createElement("button");
      btnL.id = "sf-toggle-left";
      btnL.className = "sf-sidebar-toggle";
      btnL.setAttribute("type", "button");
      btnL.setAttribute("aria-label", "Toggle chapter navigation");
      btnL.innerHTML = leftOff ? CHEVRON_RIGHT : CHEVRON_LEFT;
      body.appendChild(btnL);

      if (leftOff) body.classList.add("sf-left-collapsed");

      // Position after layout settles
      requestAnimationFrame(function () {
        positionLeftBtn(btnL, sidebar, leftOff);
      });

      btnL.addEventListener("click", function () {
        leftOff = !leftOff;
        body.classList.toggle("sf-left-collapsed", leftOff);
        localStorage.setItem(STORAGE_LEFT, String(leftOff));
        btnL.innerHTML = leftOff ? CHEVRON_RIGHT : CHEVRON_LEFT;
        btnL.setAttribute("aria-expanded", String(!leftOff));
        // Reposition after CSS transition completes
        setTimeout(function () {
          positionLeftBtn(btnL, sidebar, leftOff);
        }, 320);
        // Immediate position for collapsed
        if (leftOff) btnL.style.left = "0px";
      });

      // Reposition on window resize
      window.addEventListener("resize", function () {
        positionLeftBtn(btnL, sidebar, leftOff);
      });
    }

    // --- Right sidebar toggle ---
    if (marginSidebar) {
      var btnR = document.createElement("button");
      btnR.id = "sf-toggle-right";
      btnR.className = "sf-sidebar-toggle";
      btnR.setAttribute("type", "button");
      btnR.setAttribute("aria-label", "Toggle table of contents");
      btnR.innerHTML = rightOff ? CHEVRON_LEFT : CHEVRON_RIGHT;
      body.appendChild(btnR);

      if (rightOff) body.classList.add("sf-right-collapsed");

      btnR.addEventListener("click", function () {
        rightOff = !rightOff;
        body.classList.toggle("sf-right-collapsed", rightOff);
        localStorage.setItem(STORAGE_RIGHT, String(rightOff));
        btnR.innerHTML = rightOff ? CHEVRON_LEFT : CHEVRON_RIGHT;
        btnR.setAttribute("aria-expanded", String(!rightOff));
      });
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
