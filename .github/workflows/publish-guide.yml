# Publish The Hitchhiker's Guide to R in Snowflake (Quarto book) to GitHub Pages.
# Source: guide/Hitchhikers_Guide_to_R_in_Snowflake/ (synced from monorepo guide/).
#
# One-time repo setup: Settings → Pages → Build and deployment → GitHub Actions.

name: Publish Guide to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'guide/Hitchhikers_Guide_to_R_in_Snowflake/**'
      - 'guide/requirements.txt'
      - '.github/workflows/publish-guide.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-snowflaker-guide
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'Snowflake-Labs/snowflakeR'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: guide/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r guide/requirements.txt

      - name: Set up Quarto
        run: |
          wget -q "https://github.com/quarto-dev/quarto-cli/releases/download/v1.6.43/quarto-1.6.43-linux-amd64.deb" -O quarto.deb
          sudo dpkg -i quarto.deb
          rm quarto.deb
          quarto --version

      - name: Render Quarto book
        run: |
          cd guide/Hitchhikers_Guide_to_R_in_Snowflake
          quarto render --to html --no-execute

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: guide/Hitchhikers_Guide_to_R_in_Snowflake/_site

  deploy:
    if: github.repository == 'Snowflake-Labs/snowflakeR'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
